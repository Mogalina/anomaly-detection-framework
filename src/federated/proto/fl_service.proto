syntax = "proto3";

package fl;

// Compression algorithm negotiated per-message.
// The edge node chooses the algorithm based on its real-time resource state
// and embeds the choice here so the coordinator can decompress correctly.
enum CompressionType {
  // No compression 
  NONE = 0;

  // LZ4 compression
  // A fast, lossless compression algorithm that is suitable for real-time 
  // compression of model weights. It is a good choice for edge devices with 
  // limited CPU resources. 
  LZ4  = 1;

  // ZSTD compression
  // A high-ratio, lossless compression algorithm that achieves significantly
  // smaller payloads than LZ4 by using entropy coding (Huffman + dictionary).
  // Ideal for nodes with spare CPU cycles and bandwidth-constrained networks
  // (e.g. cellular or WAN links), especially with Top-K sparse gradients.
  ZSTD = 2;
}

message RegisterRequest {
  string client_id = 1;

  // JSON-encoded client metadata (device_type, capabilities, etc.)
  string metadata_json = 2;
}

message RegisterResponse {
  // Registration status ("ok" or error message)
  string status = 1;

  // Serialized and compressed global model weights
  bytes global_model = 2;

  // Current round number 
  int32 current_round = 3;

  // Compression algorithm used for global model 
  CompressionType compression = 4;
}

message UpdateRequest {
  string client_id = 1;
  int32 round = 2;
  int32 num_samples = 3;

  // Serialized + compressed model update (torch.save bytes of state_dict)
  bytes payload = 4;

  // Compression algorithm used for payload
  CompressionType compression = 5;

  // JSON-encoded training, including system metrics
  string metrics_json = 6;
}

message UpdateResponse {
  // Update status ("ok" or error message)
  string status = 1;

  // Optional message (e.g. error details)
  string message = 2;
}

message GlobalModelRequest {
  string client_id = 1;
}

message GlobalModelResponse {
  bytes payload = 1;

  // Compression algorithm used for payload
  CompressionType compression = 2;

  // Current round number 
  int32 current_round = 3;
}

service FLService {
  // Register this client with the coordinator and download the global model
  rpc Register (RegisterRequest) returns (RegisterResponse);

  // Submit a model update to the coordinator
  rpc SubmitUpdate (UpdateRequest) returns (UpdateResponse);

  // Download the latest global model
  rpc GetGlobalModel (GlobalModelRequest) returns (GlobalModelResponse);
}
