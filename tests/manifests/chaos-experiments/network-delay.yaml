apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-delay-ticket-service
  namespace: default
spec:
  action: delay
  mode: one
  selector:
    labelSelectors:
      app: ticket-service
  delay:
    latency: '200ms'
    correlation: '100'
    jitter: '0ms'
  duration: '5m'