version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: anomaly_detection
      POSTGRES_USER: adf_user
      POSTGRES_PASSWORD: adf_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - adf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adf_user -d anomaly_detection"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - adf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # HTTP collector
      - "6831:6831/udp"  # Agent
    networks:
      - adf-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - adf-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - adf-network

  coordinator:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.coordinator
    ports:
      - "50051:50051"
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      COORDINATOR_HOST: "0.0.0.0"
      COORDINATOR_PORT: "50051"
      DATABASE_URL: "postgresql://adf_user:adf_password@postgres:5432/anomaly_detection"
      REDIS_URL: "redis://redis:6379/0"
      JAEGER_HOST: jaeger
      PYTHONPATH: /app/src
    volumes:
      - coordinator_checkpoints:/app/checkpoints
    networks:
      - adf-network
    restart: unless-stopped
    healthcheck:
      test: >
        python -c "import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)"
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  edge-detector-1:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.edge
    environment:
      CLIENT_ID: edge-1
      SERVICE_NAME: service-1
      COORDINATOR_HOST: coordinator
      COORDINATOR_PORT: "50051"
      NODE_PROFILE: standard
      PYTHONPATH: /app/src
    depends_on:
      coordinator:
        condition: service_healthy
    networks:
      - adf-network
    restart: unless-stopped

  edge-detector-2:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.edge
    environment:
      CLIENT_ID: edge-2
      SERVICE_NAME: service-2
      COORDINATOR_HOST: coordinator
      COORDINATOR_PORT: "50051"
      NODE_PROFILE: standard
      PYTHONPATH: /app/src
    depends_on:
      coordinator:
        condition: service_healthy
    networks:
      - adf-network
    restart: unless-stopped

  edge-detector-3:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.edge
    environment:
      CLIENT_ID: edge-3
      SERVICE_NAME: service-3
      COORDINATOR_HOST: coordinator
      COORDINATOR_PORT: "50051"
      NODE_PROFILE: standard
      PYTHONPATH: /app/src
    depends_on:
      coordinator:
        condition: service_healthy
    networks:
      - adf-network
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  coordinator_checkpoints:

networks:
  adf-network:
    driver: bridge
